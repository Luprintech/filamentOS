# Coloca este archivo en: /etc/nginx/sites-available/calculadora3d.luprintech.com
# Luego actívalo: sudo ln -s /etc/nginx/sites-available/calculadora3d.luprintech.com /etc/nginx/sites-enabled/
# Y recarga Nginx: sudo nginx -t && sudo systemctl reload nginx

# ── Redirigir HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name calculadora3d.luprintech.com;

    # Ruta para que Certbot pueda verificar el dominio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name calculadora3d.luprintech.com;

    # Certificados Let's Encrypt (generados con Certbot)
    ssl_certificate     /etc/letsencrypt/live/calculadora3d.luprintech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/calculadora3d.luprintech.com/privkey.pem;

    # Configuración SSL moderna
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Cabeceras de seguridad
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Tamaño máximo de subida (archivos G-code / 3MF)
    client_max_body_size 50M;

    # ── Proxy hacia el contenedor Docker ──────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necesario para que Express detecte HTTPS y active secure cookies
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
